name: phytonote
description: "Saisie validée pour spectrophotométrie UV — DPPH, FRAP, CAT, TPC, TFC, ABTS."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path_provider: ^2.1.4
  path: ^1.9.0
  fl_chart: ^0.69.0
  excel: ^4.0.6
  intl: ^0.19.0
  uuid: ^4.5.1
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/starter_packs/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#2E5D3C"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21
